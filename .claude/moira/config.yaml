version: "1.0"

project:
  name: "Moira"
  root: "/Users/minddecay/Documents/Projects/Moira"
  stack: Bash

classification:
  default_pipeline: standard
  size_hints_override: false

pipelines:
  quick:
    max_retries: 1
  standard:
    max_retries: 2
  full:
    max_retries: 2
  decomposition:
    max_retries: 2

budgets:
  orchestrator_max_percent: 25
  agent_max_load_percent: 70
  per_agent:
    classifier: 20000
    explorer: 140000
    analyst: 80000
    architect: 100000
    planner: 70000
    implementer: 120000
    reviewer: 100000
    tester: 90000
    reflector: 80000
    auditor: 140000
    scribe: 80000

quality:
  mode: conform
  evolution:
    current_target: ""
    cooldown_remaining: 0

knowledge:
  freshness_confidence_threshold: 30
  archival_max_entries: 100

audit:
  light_every_n_tasks: 10
  standard_every_n_tasks: 20
  auto_batch_apply_risk: low

mcp:
  enabled: true
  registry_path: config/mcp-registry.yaml

graph:
  enabled: true
  timeout: 60

tooling:
  post_implementation: []

hooks:
  guard_enabled: true
  budget_tracking_enabled: true

logs:
  rotation_threshold_lines: 5000
  archive_dir: "state/archive"

bootstrap:
  quick_scan_completed: true
  quick_scan_at: "2026-03-23T00:00:00Z"
  deep_scan_completed: true
  deep_scan_pending: false
