# MCP Tools Registry
# Generated by /moira:init — edit to customize tool guidelines

servers:
  ariadne:
    type: structural
    infrastructure: true
    tools:
      ariadne_overview:
        purpose: "Project summary: node/edge counts, language breakdown, layer distribution, critical files, cycles count, max depth"
        cost: medium
        reliability: high
        when_to_use: "When you need a high-level structural overview of the entire project"
        when_NOT_to_use: "When you need details about a specific file or cluster"
        token_estimate: 3000
      ariadne_file:
        purpose: "File detail: type, layer, arch_depth, exports, cluster, centrality, incoming/outgoing edges"
        cost: medium
        reliability: high
        when_to_use: "When you need structural details about a specific file — its role, dependencies, and position in the architecture"
        when_NOT_to_use: "When you need to read the file contents (use Read instead)"
        token_estimate: 3000
      ariadne_dependencies:
        purpose: "Direct dependencies of a file. Direction: in, out, or both"
        cost: medium
        reliability: high
        when_to_use: "When you need to know what a file depends on or what depends on it"
        when_NOT_to_use: "When you need transitive dependencies (use ariadne_blast_radius or ariadne_subgraph instead)"
        token_estimate: 3000
      ariadne_blast_radius:
        purpose: "Reverse BFS: map of affected files with distances from the given file"
        cost: medium
        reliability: high
        when_to_use: "Before modifying a file to understand impact — which files would be affected and how far the ripple extends"
        when_NOT_to_use: "When you only need direct dependencies (use ariadne_dependencies instead)"
        token_estimate: 3500
      ariadne_centrality:
        purpose: "Bottleneck files sorted by betweenness centrality score"
        cost: medium
        reliability: high
        when_to_use: "When identifying architectural bottlenecks — files that many paths flow through"
        when_NOT_to_use: "When you need overall importance ranking (use ariadne_importance instead)"
        token_estimate: 3000
      ariadne_importance:
        purpose: "Files ranked by combined importance score (betweenness centrality + PageRank). Returns top N files."
        cost: medium
        reliability: high
        when_to_use: "When identifying the most architecturally important files in the project"
        when_NOT_to_use: "When you need details about a specific file (use ariadne_file instead)"
        token_estimate: 3000
      ariadne_cluster:
        purpose: "Cluster detail: files, internal/external deps, cohesion"
        cost: medium
        reliability: high
        when_to_use: "When examining a specific module/cluster — its files, cohesion, and coupling"
        when_NOT_to_use: "When you need an overview of all clusters (use ariadne_compressed level 0 instead)"
        token_estimate: 3500
      ariadne_compressed:
        purpose: "Hierarchical graph compression. Level 0: project overview (clusters). Level 1: cluster detail (files). Level 2: file neighborhood."
        cost: medium
        reliability: high
        when_to_use: "When navigating the project hierarchy — start at level 0, drill into clusters at level 1, then files at level 2"
        when_NOT_to_use: "When you already know the specific file or cluster you want (use ariadne_file or ariadne_cluster directly)"
        token_estimate: 3500
      ariadne_cycles:
        purpose: "All strongly connected components (circular dependencies)"
        cost: medium
        reliability: high
        when_to_use: "When checking for circular dependency problems in the project"
        when_NOT_to_use: "When you need general architectural smells (use ariadne_smells instead)"
        token_estimate: 3000
      ariadne_smells:
        purpose: "Detect architectural smells: god files, circular dependencies, layer violations, hub-and-spoke, unstable foundations, dead clusters, shotgun surgery"
        cost: medium
        reliability: high
        when_to_use: "During architecture review or when reviewing large changes"
        when_NOT_to_use: "For small, localized changes"
        token_estimate: 3500
      ariadne_layers:
        purpose: "Topological layers: files grouped by architectural depth level"
        cost: medium
        reliability: high
        when_to_use: "When understanding the layered architecture — which files are foundational vs. high-level"
        when_NOT_to_use: "When you need details about a specific layer file (use ariadne_file instead)"
        token_estimate: 3000
      ariadne_metrics:
        purpose: "Martin metrics per cluster: instability, abstractness, distance from main sequence, zone classification"
        cost: medium
        reliability: high
        when_to_use: "When evaluating module quality using Robert C. Martin's package metrics"
        when_NOT_to_use: "When you need file-level rather than cluster-level metrics"
        token_estimate: 3000
      ariadne_spectral:
        purpose: "Spectral analysis: algebraic connectivity, monolith score, natural graph bisection via Fiedler vector"
        cost: medium
        reliability: high
        when_to_use: "When assessing overall project modularity and whether the codebase is a monolith"
        when_NOT_to_use: "When you need actionable file-level information"
        token_estimate: 3000
      ariadne_subgraph:
        purpose: "Extract filtered subgraph: nodes + edges + clusters in the neighborhood of given files"
        cost: medium
        reliability: high
        when_to_use: "When you need the local dependency graph around one or more files"
        when_NOT_to_use: "When you need the full project graph (use ariadne_overview or ariadne_compressed level 0)"
        token_estimate: 3500
      ariadne_diff:
        purpose: "Structural diff since last auto-update: added/removed nodes and edges, new/resolved cycles, new/resolved smells"
        cost: medium
        reliability: high
        when_to_use: "When checking what structural changes have occurred since the last graph update"
        when_NOT_to_use: "When you need current state rather than changes (use ariadne_overview or ariadne_smells)"
        token_estimate: 3000
      ariadne_freshness:
        purpose: "Graph freshness: overall confidence, stale files list, last update time"
        cost: low
        reliability: high
        when_to_use: "When checking if the dependency graph is up to date before relying on its data"
        when_NOT_to_use: "When you do not need to validate graph currency"
        token_estimate: 1500
      ariadne_views_export:
        purpose: "Pre-generated markdown views from .ariadne/views/. Generic markdown for any consumer."
        cost: medium
        reliability: high
        when_to_use: "When you need pre-rendered human-readable views of the project structure"
        when_NOT_to_use: "When you need raw data for programmatic analysis"
        token_estimate: 3500
  claude.ai_Context7:
    type: documentation
    tools:
      resolve-library-id:
        purpose: "Resolves a package/product name to a Context7-compatible library ID. Must be called before query-docs."
        cost: low
        reliability: high
        when_to_use: "Before calling query-docs, to obtain the correct library ID for a given package name"
        when_NOT_to_use: "When you already have a Context7 library ID in /org/project format"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      query-docs:
        purpose: "Retrieves up-to-date documentation and code examples for any programming library or framework using a Context7 library ID"
        cost: medium-high
        reliability: high
        when_to_use: "When you need current API docs, code examples, or usage patterns for a specific library. Limited to 3 calls per question."
        when_NOT_to_use: "For general knowledge questions not about a specific library. When you have not first resolved the library ID. When you have already made 3 calls for the current question."
        budget_impact: "~5-15k tokens per call depending on query scope"
        token_estimate: 8000
  claude.ai_Figma:
    type: design
    tools:
      get_design_context:
        purpose: "Primary design-to-code tool. Returns reference code, screenshot, and contextual metadata for a Figma node."
        cost: high
        reliability: high
        when_to_use: "When implementing UI from a Figma design. When a user shares a Figma URL and wants code generated from it."
        when_NOT_to_use: "When no Figma file or node is referenced. When only structural overview is needed (use get_metadata instead)."
        budget_impact: "~15-30k tokens per call (includes screenshot and code)"
        token_estimate: 20000
      get_screenshot:
        purpose: "Generates a screenshot for a given Figma node"
        cost: medium
        reliability: high
        when_to_use: "When you need a visual reference of a design without the full code context"
        when_NOT_to_use: "When you need code output (use get_design_context instead)"
        budget_impact: "~3-5k tokens per call (image data)"
        token_estimate: 4000
      get_metadata:
        purpose: "Gets structural metadata (node IDs, layer types, names, positions, sizes) for a Figma node in XML format"
        cost: medium
        reliability: high
        when_to_use: "When you need a structural overview of a Figma page or node hierarchy before drilling into specific nodes"
        when_NOT_to_use: "When you need code or visual output (use get_design_context instead)"
        budget_impact: "~3-8k tokens per call depending on node complexity"
        token_estimate: 5000
      get_figjam:
        purpose: "Gets UI code for a FigJam node. Only works with FigJam files, not regular Figma design files."
        cost: medium-high
        reliability: medium
        when_to_use: "When a user shares a FigJam board URL (figma.com/board/...)"
        when_NOT_to_use: "For regular Figma design files. For non-FigJam content."
        budget_impact: "~5-15k tokens per call"
        token_estimate: 8000
      generate_diagram:
        purpose: "Creates flowcharts, decision trees, gantt charts, sequence diagrams, or state diagrams in FigJam using Mermaid.js syntax"
        cost: medium
        reliability: medium
        when_to_use: "When creating visual diagrams in FigJam. Supports: graph, flowchart, sequenceDiagram, stateDiagram, stateDiagram-v2, gantt."
        when_NOT_to_use: "For class diagrams, timelines, venn diagrams, ER diagrams. For Figma designs (not FigJam). For font changes or moving shapes."
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      whoami:
        purpose: "Returns information about the authenticated Figma user. Useful for debugging permission issues."
        cost: low
        reliability: high
        when_to_use: "When experiencing permission issues with other Figma tools. To verify which user is authenticated."
        when_NOT_to_use: "During normal workflows where authentication is not in question."
        budget_impact: "~500 tokens per call"
        token_estimate: 500
      get_variable_defs:
        purpose: "Gets design token variable definitions (colors, sizes, spacings) for a Figma node"
        cost: medium
        reliability: high
        when_to_use: "When you need to extract design tokens from a Figma file to map to a project's token system"
        when_NOT_to_use: "When you do not need design token information"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      get_code_connect_map:
        purpose: "Gets existing Code Connect mappings between Figma nodes and codebase components"
        cost: low
        reliability: high
        when_to_use: "When checking if a Figma component already has a mapped codebase component"
        when_NOT_to_use: "When there are no Code Connect mappings configured"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      add_code_connect_map:
        purpose: "Maps a Figma node to a code component in the codebase using Code Connect"
        cost: low
        reliability: high
        when_to_use: "When establishing a new mapping between a Figma component and a codebase component"
        when_NOT_to_use: "When you have not identified the correct source component. When bulk mapping (use send_code_connect_mappings instead)."
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      get_code_connect_suggestions:
        purpose: "Gets AI-suggested mappings between Figma nodes and code components. Workflow: call this, review with user, then call send_code_connect_mappings."
        cost: medium
        reliability: medium
        when_to_use: "When you want AI-assisted suggestions for linking Figma components to code"
        when_NOT_to_use: "When you already know the exact mapping to create"
        budget_impact: "~3-5k tokens per call"
        token_estimate: 4000
      send_code_connect_mappings:
        purpose: "Saves multiple Code Connect mappings in bulk. Used after get_code_connect_suggestions to persist approved mappings."
        cost: low
        reliability: high
        when_to_use: "After reviewing suggestions from get_code_connect_suggestions and getting user approval"
        when_NOT_to_use: "Without first getting and reviewing suggestions. For single mappings (use add_code_connect_map instead)."
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      create_design_system_rules:
        purpose: "Generates a prompt for creating design system rules for the current repository"
        cost: medium
        reliability: medium
        when_to_use: "When setting up design system conventions for a project"
        when_NOT_to_use: "When design system rules already exist and are sufficient"
        budget_impact: "~3-5k tokens per call"
        token_estimate: 4000
  # ariadne duplicate removed — merged into main entry above
  claude.ai_Gmail:
    type: communication
    status: available_no_tools
    tools: {}
  claude.ai_Google_Calendar:
    type: other
    status: available_no_tools
    tools: {}
