_meta:
  name: Next.js
  stack_id: nextjs
  match_signals:
    - {signal: "next", context: "package.json dependencies", weight: 10}
    - {signal: "next.config", context: "file exists", weight: 5}
    - {signal: "@next/", context: "package.json dependencies", weight: 3}

stack:
  language: TypeScript
  framework: Next.js
  runtime: Node.js
  styling: Tailwind CSS
  orm: none
  testing: Jest
  ci: GitHub Actions

conventions:
  naming:
    files: kebab-case
    components: PascalCase
    functions: camelCase
    constants: UPPER_SNAKE_CASE
    types: PascalCase
  formatting:
    indent: 2 spaces
    quotes: single
    semicolons: true
    max_line_length: 100
  structure:
    app_router: src/app/{route}/page.tsx
    components: src/components/
    lib: src/lib/
    api_routes: src/app/api/{route}/route.ts

patterns:
  data_fetching: Server Components + Server Actions
  validation: Zod schemas
  error_handling: error.tsx error boundaries

boundaries:
  do_not_modify:
    - node_modules/
    - .next/
    - public/
    - prisma/migrations/
  modify_with_caution:
    - next.config.*
    - middleware.ts
    - prisma/schema.prisma
