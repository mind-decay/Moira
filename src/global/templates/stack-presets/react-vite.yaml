_meta:
  name: React + Vite
  stack_id: react-vite
  match_signals:
    - {signal: "react", context: "package.json dependencies", weight: 5}
    - {signal: "vite", context: "package.json devDependencies", weight: 8}
    - {signal: "vite.config", context: "file exists", weight: 5}

stack:
  language: TypeScript
  framework: React
  runtime: Node.js
  styling: Tailwind CSS
  orm: none
  testing: Vitest
  ci: GitHub Actions

conventions:
  naming:
    files: kebab-case
    components: PascalCase
    functions: camelCase
    constants: UPPER_SNAKE_CASE
    types: PascalCase
  formatting:
    indent: 2 spaces
    quotes: single
    semicolons: true
    max_line_length: 100
  structure:
    components: src/components/
    pages: src/pages/
    hooks: src/hooks/
    stores: src/stores/
    utils: src/utils/

patterns:
  data_fetching: React Query / SWR
  client_state: Zustand / Redux
  routing: React Router
  validation: Zod schemas
  error_handling: Error boundaries + try-catch

boundaries:
  do_not_modify:
    - node_modules/
    - dist/
  modify_with_caution:
    - vite.config.*
    - index.html
