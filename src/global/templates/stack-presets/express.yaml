_meta:
  name: Express.js
  stack_id: express
  match_signals:
    - {signal: "express", context: "package.json dependencies", weight: 10}

stack:
  language: TypeScript
  framework: Express
  runtime: Node.js
  styling: none
  orm: none
  testing: Jest
  ci: GitHub Actions

conventions:
  naming:
    files: kebab-case
    components: PascalCase
    functions: camelCase
    constants: UPPER_SNAKE_CASE
    types: PascalCase
  formatting:
    indent: 2 spaces
    quotes: single
    semicolons: true
    max_line_length: 100
  structure:
    routes: src/routes/
    controllers: src/controllers/
    services: src/services/
    middleware: src/middleware/
    models: src/models/

patterns:
  api_style: REST
  error_handling: Express error middleware
  validation: express-validator / Joi / Zod
  data_fetching: none

boundaries:
  do_not_modify:
    - node_modules/
    - dist/
  modify_with_caution:
    - src/middleware/
