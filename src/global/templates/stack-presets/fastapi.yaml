_meta:
  name: FastAPI
  stack_id: fastapi
  match_signals:
    - {signal: "fastapi", context: "pyproject.toml or requirements.txt", weight: 10}
    - {signal: "uvicorn", context: "pyproject.toml or requirements.txt", weight: 5}

stack:
  language: Python
  framework: FastAPI
  runtime: Python
  styling: none
  orm: SQLAlchemy
  testing: pytest
  ci: GitHub Actions

conventions:
  naming:
    files: snake_case
    components: PascalCase
    functions: snake_case
    constants: UPPER_SNAKE_CASE
    types: PascalCase
  formatting:
    indent: 4 spaces
    quotes: double
    semicolons: false
    max_line_length: 120
  structure:
    routers: app/routers/
    models: app/models/
    schemas: app/schemas/
    services: app/services/
    core: app/core/

patterns:
  api_style: REST with Pydantic models
  validation: Pydantic v2
  db_access: SQLAlchemy with Alembic migrations
  error_handling: HTTPException + exception handlers
  data_fetching: none

boundaries:
  do_not_modify:
    - __pycache__/
    - .venv/
    - alembic/versions/
  modify_with_caution:
    - alembic.ini
    - app/core/config.py
