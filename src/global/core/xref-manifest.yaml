# Cross-Reference Manifest — Data Dependencies Between Files
# Source: D-077
# Purpose: Agents consult this before committing to find all affected files.
# Tier 1 tests validate entries against actual file content.
# Phase 11 delivers manifest + validation; mechanical enforcement deferred to Phase 12 (D-093g).

entries:
  - id: xref-001
    description: "Agent budget defaults"
    canonical_source: "src/schemas/budgets.schema.yaml"
    dependents:
      - file: "src/global/lib/budget.sh"
        field: "_MOIRA_BUDGET_DEFAULTS_*"
        sync_type: "value_must_match"
      - file: "src/global/core/rules/roles/*.yaml"
        field: "_meta.budget"
        sync_type: "value_must_match"
    values_tracked: "per-agent token budget numbers (classifier=20000, explorer=140000, analyst=80000, architect=100000, planner=70000, implementer=120000, reviewer=100000, tester=90000, reflector=80000, auditor=140000, scribe=80000)"

  - id: xref-002
    description: "Pipeline step names"
    canonical_source: "src/global/core/pipelines/*.yaml"
    dependents:
      - file: "src/global/lib/state.sh"
        field: "valid_steps"
        sync_type: "enum_must_match"
      - file: "src/schemas/current.schema.yaml"
        field: "step enum"
        sync_type: "enum_must_match"
    values_tracked: "pipeline step name strings (classification, exploration, analysis, architecture, plan, implementation, review, testing, reflection, decomposition, integration, completion, gather, scope, depth_checkpoint, organize, synthesis)"

  - id: xref-003
    description: "Agent role names (Greek)"
    canonical_source: "design/architecture/agents.md"
    dependents:
      - file: "src/global/core/rules/roles/*.yaml"
        field: "filenames"
        sync_type: "names_must_match"
      - file: "src/global/core/knowledge-access-matrix.yaml"
        field: "agent keys"
        sync_type: "names_must_match"
      - file: "src/schemas/telemetry.schema.yaml"
        field: "role enum values"
        sync_type: "enum_must_match"
    values_tracked: "agent Greek names (apollo, hermes, athena, metis, daedalus, hephaestus, themis, aletheia, mnemosyne, argus, calliope) and role mappings (classifier, explorer, analyst, architect, planner, implementer, reviewer, tester, reflector, auditor, scribe)"

  - id: xref-004
    description: "Knowledge access levels"
    canonical_source: "src/global/core/knowledge-access-matrix.yaml"
    dependents:
      - file: "src/global/core/rules/roles/*.yaml"
        field: "knowledge_access"
        sync_type: "value_must_match"
      - file: "src/global/skills/dispatch.md"
        field: "knowledge access notes"
        sync_type: "value_must_match"
    values_tracked: "per-agent knowledge type access levels (L0/L1/L2/null) — includes calliope (project_model=L1, conventions=L1, decisions=L0, patterns=L0, graph=L0)"

  - id: xref-005
    description: "Quality gate assignments"
    canonical_source: "src/global/skills/dispatch.md"
    dependents:
      - file: "src/global/core/rules/quality/*.yaml"
        field: "quality checklist files"
        sync_type: "names_must_match"
      - file: "src/schemas/findings.schema.yaml"
        field: "_meta.gate enum"
        sync_type: "enum_must_match"
    values_tracked: "agent-to-gate mapping — implementation: (athena=Q1/q1-completeness, metis=Q2/q2-soundness, daedalus=Q3/q3-feasibility, themis=Q4/q4-correctness, aletheia=Q5/q5-coverage) — analytical: (themis=QA1/qa1-scope-completeness, themis=QA2/qa2-evidence-quality, themis=QA3/qa3-actionability, themis=QA4/qa4-analytical-rigor)"

  - id: xref-006
    description: "Pipeline gate names"
    canonical_source: "src/global/core/pipelines/*.yaml"
    dependents:
      - file: "src/global/skills/gates.md"
        field: "gate presentation templates"
        sync_type: "names_must_match"
      - file: "src/schemas/status.schema.yaml"
        field: "gates item_schema"
        sync_type: "names_must_match"
    values_tracked: "gate names (classification_gate, architecture_gate, plan_gate, final_gate, scope_gate, depth_checkpoint_gate)"

  - id: xref-007
    description: "Retry hard limits"
    canonical_source: "design/subsystems/fault-tolerance.md"
    dependents:
      - file: "src/global/lib/retry.sh"
        field: "_MOIRA_RETRY_HARD_LIMIT_E5, _MOIRA_RETRY_HARD_LIMIT_E6"
        sync_type: "value_must_match"
      - file: "src/global/skills/errors.md"
        field: "E5-QUALITY max retries, E6-AGENT retry count"
        sync_type: "value_must_match"
    values_tracked: "retry hard limits per error type (E5_QUALITY=2 attempts, E6_AGENT=1 retry)"

  - id: xref-008
    description: "Graph access levels"
    canonical_source: "src/global/core/knowledge-access-matrix.yaml"
    dependents:
      - file: "src/global/core/rules/roles/*.yaml"
        field: "knowledge_access.graph"
        sync_type: "value_must_match"
      - file: "src/global/skills/dispatch.md"
        field: "graph context loading levels"
        sync_type: "value_must_match"
    values_tracked: "per-agent graph access levels (apollo=L0, hermes=L0, athena=L1, metis=L1, daedalus=L1, hephaestus=L2, themis=L1, aletheia=L1, mnemosyne=L2, argus=L2, calliope=L0)"

  - id: xref-009
    description: "Graph shell functions"
    canonical_source: "src/global/lib/graph.sh"
    dependents:
      - file: "src/commands/moira/init.md"
        field: "moira_graph_* calls"
        sync_type: "function_must_exist"
      - file: "src/commands/moira/refresh.md"
        field: "moira_graph_* calls"
        sync_type: "function_must_exist"
      - file: "src/commands/moira/status.md"
        field: "moira_graph_* calls"
        sync_type: "function_must_exist"
      - file: "src/commands/moira/health.md"
        field: "moira_graph_* calls"
        sync_type: "function_must_exist"
      - file: "src/commands/moira/graph.md"
        field: "ariadne query calls"
        sync_type: "function_must_exist"
      - file: "src/global/skills/dispatch.md"
        field: "moira_graph_read_view calls"
        sync_type: "function_must_exist"
    values_tracked: "graph.sh function names (moira_graph_check_binary, moira_graph_build, moira_graph_update, moira_graph_query, moira_graph_views_generate, moira_graph_serve_start, moira_graph_serve_stop, moira_graph_is_fresh, moira_graph_summary, moira_graph_read_view, moira_graph_output_dir, moira_graph_views_dir, moira_graph_analytical_baseline)"

  - id: xref-010
    description: "graph_available pipeline state field"
    canonical_source: "src/schemas/current.schema.yaml"
    dependents:
      - file: "src/global/skills/orchestrator.md"
        field: "graph_available bootstrap check"
        sync_type: "field_must_exist"
      - file: "src/global/skills/dispatch.md"
        field: "graph_available context loading"
        sync_type: "field_must_exist"
    values_tracked: "graph_available boolean field (set by orchestrator, consumed by dispatch)"

  - id: xref-011
    description: "Graph config section"
    canonical_source: "src/schemas/config.schema.yaml"
    dependents:
      - file: "src/global/skills/orchestrator.md"
        field: "graph.enabled check"
        sync_type: "field_must_exist"
    values_tracked: "graph config fields (graph.enabled boolean, graph.timeout number)"
