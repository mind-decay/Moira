_meta:
  name: q4-correctness
  gate: Q4
  description: Code Correctness
  agent: themis
  pipeline_step: review

sections:
  correctness:
    items:
      - id: Q4-C01
        check: "Implements exactly what plan specifies (no more, no less)"
        required: true
      - id: Q4-C02
        check: "All acceptance criteria from requirements are met"
        required: true
      - id: Q4-C03
        check: "Edge cases from requirements are handled"
        required: true
      - id: Q4-C04
        check: "Error handling matches architecture decision"
        required: true

  standards:
    items:
      - id: Q4-S01
        check: "SOLID principles respected"
        required: true
      - id: Q4-S02
        check: "DRY — no copy-pasted logic (no premature abstractions either)"
        required: true
      - id: Q4-S03
        check: "KISS — simplest solution that works"
        required: true
      - id: Q4-S04
        check: "YAGNI — no code for unrequested future requirements"
        required: true

  performance:
    items:
      - id: Q4-P01
        check: "No N+1 queries"
        required: true
      - id: Q4-P02
        check: "No synchronous operations that should be async"
        required: true
      - id: Q4-P03
        check: "No memory leaks (unclosed connections, growing arrays, unreleased listeners)"
        required: true
      - id: Q4-P04
        check: "No unbounded operations (pagination where needed)"
        required: true
      - id: Q4-P05
        check: "Database queries use indexes"
        required: true

  security:
    items:
      - id: Q4-X01
        check: "No SQL/command injection (parameterized queries)"
        required: true
      - id: Q4-X02
        check: "No XSS (output encoding)"
        required: true
      - id: Q4-X03
        check: "No sensitive data in logs"
        required: true
      - id: Q4-X04
        check: "Input validation at system boundary"
        required: true
      - id: Q4-X05
        check: "Auth/authz checks where needed"
        required: true

  integration:
    items:
      - id: Q4-I01
        check: "Imports resolve correctly"
        required: true
      - id: Q4-I02
        check: "Types match across file boundaries"
        required: true
      - id: Q4-I03
        check: "API contracts match between caller and callee"
        required: true
      - id: Q4-I04
        check: "No hardcoded values that should be config"
        required: true

  mcp_usage:
    items:
      - id: Q4-M01
        check: "All MCP tool calls were authorized in the plan"
        required: false
      - id: Q4-M02
        check: "No unauthorized MCP calls were made"
        required: false
      - id: Q4-M03
        check: "No MCP calls for information available in project files"
        required: false
      - id: Q4-M04
        check: "MCP responses were actually used (not fetched and ignored)"
        required: false
      - id: Q4-M05
        check: "MCP results were applied correctly (not misinterpreted)"
        required: false

  project_conventions:
    items:
      - id: Q4-V01
        check: "Naming matches conventions"
        required: true
      - id: Q4-V02
        check: "File location matches structure"
        required: true
      - id: Q4-V03
        check: "Code style matches codebase"
        required: true
      - id: Q4-V04
        check: "Error handling pattern matches project pattern"
        required: true

  craftsmanship:
    items:
      - id: Q4-F01
        check: "Solution approach is appropriate for the problem complexity — not over-engineered, not under-engineered"
        severity_if_fail: warning
        required: true
      - id: Q4-F02
        check: "Code is readable without requiring comments to explain intent — clear naming, linear flow, small functions"
        severity_if_fail: warning
        required: true
      - id: Q4-F03
        check: "Error handling is meaningful — errors are specific, actionable, and propagated appropriately, not swallowed or generically caught"
        severity_if_fail: warning
        required: true
      - id: Q4-F04
        check: "No unnecessary complexity — no premature abstractions, no wrapper functions that add no value, no indirection without purpose"
        severity_if_fail: warning
        required: true

  structural_quality_delta:
    items:
      - id: Q4-D01
        check: "ariadne_diff: no new architectural smells introduced in changed area"
        severity_if_fail: warning
        required: false
      - id: Q4-D02
        check: "ariadne_diff: no new circular dependencies introduced"
        severity_if_fail: warning
        required: false
      - id: Q4-D03
        check: "ariadne_refactor_opportunities: no new refactoring needs in changed area"
        severity_if_fail: warning
        required: false
      - id: Q4-D04
        check: "Structural quality delta compared against baseline from plan — verdict: improved | neutral | degraded:minor | degraded:major"
        severity_if_fail: warning
        required: false

  epistemic_integrity:
    items:
      - id: Q4-E01
        check: "Architecture artifact contains ## Epistemic Status section when external system claims are present"
        severity_if_fail: warning
        required: true
      - id: Q4-E02
        check: "All UNVERIFIED claims are explicitly marked — no hedged claims ('may not', 'might not') without UNVERIFIED classification"
        severity_if_fail: critical
        required: true
      - id: Q4-E03
        check: "Load-bearing UNVERIFIED claims are flagged — decisions that would change if the claim is false are identified"
        severity_if_fail: critical
        required: true
      - id: Q4-E04
        check: "VERIFIED claims include evidence source (documentation reference, tool output, codebase observation)"
        severity_if_fail: warning
        required: true
      - id: Q4-E05
        check: "No claims about external systems whose documentation was listed as DOCUMENTATION_NOT_AVAILABLE are presented as facts"
        severity_if_fail: critical
        required: true

severity:
  critical: "Blocks pipeline, must fix (correctness, security, broken contracts)"
  warning: "Should fix, can proceed with user approval"
  suggestion: "Logged for reflection, doesn't block"

on_critical: "STATUS: failure — critical code issues found"
