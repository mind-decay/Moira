# Quick Pipeline Definition
# Source: design/architecture/pipelines.md → Quick Pipeline
# Trigger: small task + high classifier confidence (Art 2.1)

_meta:
  name: quick
  description: "Fast pipeline for small, well-understood tasks"
  trigger:
    size: small
    confidence: high

steps:
  - id: classification
    agent: apollo
    role: classifier
    mode: foreground
    writes_to: "tasks/{task_id}/classification.md"
    reads_from: "tasks/{task_id}/input.md"

  - id: exploration
    agent: hermes
    role: explorer
    mode: foreground
    writes_to: "tasks/{task_id}/context.md"  # Intentionally "context.md" (not "exploration.md") — lighter exploration for quick pipeline
    reads_from: "tasks/{task_id}/classification.md"

  # No Analyst step — quick pipeline uses classification as implicit requirements for small tasks

  - id: implementation
    agent: hephaestus
    role: implementer
    mode: foreground
    writes_to: "tasks/{task_id}/implementation.md"
    reads_from:
      - "tasks/{task_id}/context.md"
      - "tasks/{task_id}/classification.md"

  - id: review
    agent: themis
    role: reviewer
    mode: foreground
    writes_to: "tasks/{task_id}/review.md"
    reads_from:
      - "tasks/{task_id}/implementation.md"
      - "tasks/{task_id}/context.md"

  - id: completion
    agent: null
    role: final-gate
    mode: foreground
    writes_to: "tasks/{task_id}/telemetry.yaml"
    reads_from:
      - "tasks/{task_id}/review.md"
      - "tasks/{task_id}/implementation.md"

  # Dynamic checkpoint: Quality Checkpoint (see gates.md) — presented when quality-gate agent returns fail_warning
gates:
  - id: classification_gate
    after_step: classification
    required: true
    options:
      - id: proceed
        description: "Classification correct, continue"
      - id: modify
        description: "Provide different classification"
      - id: abort
        description: "Cancel task"

  - id: final_gate
    after_step: completion
    required: true
    # NOTE: These are completion actions, not gate decisions. Gate is always recorded as "proceed" (see gates.md).
    options:
      - id: done
        description: "Accept result"
      - id: tweak
        description: "Targeted modification"
      - id: redo
        description: "Rollback and redo"
      - id: diff
        description: "Show changes"
      - id: test
        description: "Run additional tests"
        # D-194: Dispatches Hephaestus ad-hoc, outside the pipeline step sequence

  # max_attempts = total executions including original (not retry count)
  # e.g., max_attempts: 3 means original + 2 retries
error_handlers:
  E1-INPUT:
    action: pause
    display: blocked_gate
    escalation: ask_user
  E2-SCOPE:
    action: stop
    display: scope_change_gate
    options:
      - upgrade
      - split
      - reduce
      - continue
  E3-CONFLICT:
    action: stop
    display: conflict_gate
    escalation: user_chooses
  E4-BUDGET:
    pre_exec:
      action: auto_split
    mid_exec:
      action: save_partial
      then: spawn_new_agent
  E5-QUALITY:
    action: retry
    max_attempts: 2
    on_max: escalate
    display: quality_failure_gate
  E6-AGENT:
    action: retry
    max_attempts: 2
    on_max: diagnose_and_escalate
    display: agent_failure_gate
  E7-DRIFT:
    action: log
    blocking: false
    note: "Non-blocking — detection via guard.sh PostToolUse hook"
  E8-STALE:
    action: warn
    display: stale_knowledge_warning
    blocking: false
  E9-SEMANTIC:
    action: retry_with_feedback
    max_attempts: 1
    # max_attempts capped by E5-QUALITY's shared retry counter
    note: "Reviewer-detected: E5-QUALITY retry path. Gate-detected: gate modify flow"
  E10-DIVERGE:
    action: escalate_to_user
    display: diverge_gate
    note: "Not applicable in Quick Pipeline (no Analyst) — present for completeness"
  E11-TRUNCATION:
    post_exec:
      action: retry_reduced_scope
      max_attempts: 1  # Quick Pipeline: no retry (max_attempts=1) — lightweight execution

post:
  reflection: lightweight
  budget_report: true
