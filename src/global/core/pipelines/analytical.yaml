# Analytical Pipeline Definition
# Source: design/architecture/analytical-pipeline.md
# Trigger: mode=analytical (any subtype)

_meta:
  name: analytical
  description: "Analysis, audit, and documentation tasks — no code output"
  trigger:
    mode: analytical
    subtype: any

# Quality gates for this pipeline (Themis uses these instead of Q1-Q5)
quality_gates: [qa1, qa2, qa3, qa4]

steps:
  - id: classification
    agent: apollo
    role: classifier
    mode: foreground
    writes_to: "tasks/{task_id}/classification.md"
    reads_from: "tasks/{task_id}/input.md"

  - id: gather
    agent: hermes
    role: explorer
    mode: foreground
    writes_to:
      - "tasks/{task_id}/exploration.md"
      - "tasks/{task_id}/ariadne-baseline.md"
    reads_from:
      - "tasks/{task_id}/classification.md"
      - "tasks/{task_id}/input.md"
    analytical_mode: true

  - id: scope
    agent: athena
    role: analyst
    mode: foreground
    writes_to: "tasks/{task_id}/scope.md"
    reads_from:
      - "tasks/{task_id}/exploration.md"
      - "tasks/{task_id}/ariadne-baseline.md"
      - "tasks/{task_id}/classification.md"

  - id: analysis
    # Agent determined by agent_map[subtype] at runtime
    role: analytical_primary
    mode: dynamic  # foreground or parallel per agent_map
    writes_to: "tasks/{task_id}/analysis-pass-{N}.md"
    reads_from:
      - "tasks/{task_id}/scope.md"
      - "tasks/{task_id}/exploration.md"
      - "tasks/{task_id}/ariadne-baseline.md"
    ariadne_mcp: true

  - id: depth_checkpoint
    agent: themis
    role: reviewer
    mode: foreground
    writes_to: "tasks/{task_id}/review-pass-{N}.md"
    reads_from:
      - "tasks/{task_id}/analysis-pass-{N}.md"
      - "tasks/{task_id}/scope.md"

  - id: organize
    # Agent determined by organize_map[subtype] at runtime
    role: analytical_organizer
    mode: foreground
    writes_to:
      - "tasks/{task_id}/finding-lattice.md"
      - "tasks/{task_id}/synthesis-plan.md"
    reads_from:
      - "tasks/{task_id}/analysis-pass-*.md"
      - "tasks/{task_id}/scope.md"

  - id: synthesis
    agent: calliope
    role: scribe
    mode: foreground
    writes_to: "tasks/{task_id}/deliverables.md"
    reads_from:
      - "tasks/{task_id}/finding-lattice.md"
      - "tasks/{task_id}/synthesis-plan.md"

  - id: review
    agent: themis
    role: reviewer
    mode: foreground
    writes_to: "tasks/{task_id}/review.md"
    reads_from:
      - "tasks/{task_id}/deliverables.md"
      - "tasks/{task_id}/finding-lattice.md"
      - "tasks/{task_id}/scope.md"

  - id: completion
    agent: null
    role: final-gate
    mode: foreground
    writes_to: "tasks/{task_id}/telemetry.yaml"
    reads_from:
      - "tasks/{task_id}/review.md"
      - "tasks/{task_id}/deliverables.md"

# Subtype -> agent mapping for analysis step
# research/design/decision use the same agent (metis) but differ in analytical focus:
#   research: open-ended investigation — follow leads, map unknowns
#   design: evaluative — assess options against constraints, recommend approach
#   decision: comparative — structured comparison of alternatives with evidence per option
agent_map:
  research:
    agents: [metis]
    mode: foreground
    focus: "Open-ended investigation. Follow leads, map unknowns, report what you find."
    ariadne_focus: "targeted queries on area of interest; ariadne_context for task-scoped context, ariadne_reading_order for understanding path; ariadne_churn for change hotspots, ariadne_hidden_deps for invisible coupling"
  design:
    agents: [metis]
    mode: foreground
    focus: "Evaluative analysis. Assess options against project constraints, recommend approach with trade-offs."
    ariadne_focus: "smells, coupling, metrics for informed design decisions; ariadne_plan_impact for change impact, ariadne_symbol_blast_radius for interface changes; ariadne_coupling for structural coupling, ariadne_churn for change stability"
  audit:
    agents: [argus, metis]
    mode: parallel
    focus: "Systematic verification. Check actual state against expected state."
    ariadne_focus: "full scan: smells, cycles, layers, metrics; ariadne_plan_impact for structural impact, ariadne_tests_for for test coverage gaps; ariadne_hotspots for risk ranking, ariadne_hidden_deps for hidden dependencies, ariadne_annotations for existing tech-debt notes"
  weakness:
    agents: [argus, metis]
    mode: parallel
    focus: "Adversarial analysis. Find what could break, what is fragile, what is over/under-engineered."
    ariadne_focus: "coupling hotspots, spectral analysis, smells; ariadne_symbol_blast_radius for interface fragility, ariadne_callers for coupling analysis; ariadne_hotspots for risk ranking, ariadne_hidden_deps for missing abstractions, ariadne_ownership for knowledge concentration risk"
  decision:
    agents: [metis]
    mode: foreground
    focus: "Structured comparison. For each alternative: evidence, trade-offs, blast radius, recommendation."
    ariadne_focus: "blast radius per alternative, coupling impact comparison; ariadne_plan_impact per alternative, ariadne_context for focused context per option; ariadne_churn for stability comparison, ariadne_ownership for knowledge availability"
  documentation:
    agents: [athena]
    mode: foreground
    support: [calliope]
    focus: "Documentation scope and structure. Determine what to document and how."
    ariadne_focus: "whatever relevant to the docs being written; ariadne_context for relevant file context, ariadne_reading_order for documentation structure; ariadne_annotations for existing notes, ariadne_ownership for domain experts"

# Subtype -> agent mapping for organize step
# Metis is universal organizer for all subtypes (D-132) — lattice construction
# is structural reasoning regardless of analytical subtype.
organize_map:
  default: metis

gates:
  - id: classification_gate
    after_step: classification
    required: true
    options:
      - id: proceed
        description: "Classification correct, continue to gather"
      - id: modify
        description: "Provide different classification"
      - id: abort
        description: "Cancel task"

  - id: scope_gate
    after_step: scope
    required: true
    options:
      - id: proceed
        description: "Scope confirmed, begin analysis"
      - id: modify
        description: "Adjust scope"
      - id: abort
        description: "Cancel task"

  - id: depth_checkpoint_gate
    after_step: depth_checkpoint
    required: true
    branching: true
    repeating: true
    options:
      - id: sufficient
        description: "Findings sufficient, proceed to synthesis"
        next_step: organize
      - id: deepen
        description: "Deepen analysis (next pass)"
        next_step: analysis
        max_per_pipeline: 5
      - id: redirect
        description: "Re-scope analysis (back to Athena, max 1x per pipeline — D-130)"
        next_step: scope
        max_per_pipeline: 1
      - id: details
        description: "Show all findings"
        action: display_only
      - id: abort
        description: "Cancel task"

  - id: final_gate
    after_step: completion
    required: true
    branching: true
    options:
      - id: done
        description: "Accept deliverables"
      - id: details
        description: "Show full analysis"
        action: display_only
      - id: modify
        description: "Provide feedback for re-synthesis (QA3/QA1 issues)"
        next_step: synthesis
      - id: re-analyze
        description: "Adjust scope and re-analyze with QA feedback (QA2/QA4 issues)"
        next_step: analysis
      - id: abort
        description: "Cancel task"

# Standard error handlers (same as standard/full pipelines)
error_handlers:
  E1-INPUT:
    action: pause
    display: blocked_gate
    escalation: ask_user
  E2-SCOPE:
    action: stop
    display: scope_change_gate
    options:
      - upgrade
      - split
      - reduce
      - continue
  E3-CONFLICT:
    action: stop
    display: conflict_gate
    escalation: user_chooses
  E4-BUDGET:
    pre_exec:
      action: auto_split
    mid_exec:
      action: save_partial
      then: spawn_new_agent
  E5-QUALITY:
    action: retry
    max_attempts: 3
    on_max: escalate
    display: quality_failure_gate
  E6-AGENT:
    action: retry
    max_attempts: 2
    on_max: diagnose_and_escalate
    display: agent_failure_gate
  E7-DRIFT:
    action: log
    blocking: false
    note: "Non-blocking — detection via guard.sh PostToolUse hook"
  E8-STALE:
    action: warn
    display: stale_knowledge_warning
    blocking: false
  E9-SEMANTIC:
    action: retry_with_feedback
    max_attempts: 3
    note: "Reviewer-detected: E5-QUALITY retry path. Gate-detected: gate modify flow"
  E10-DIVERGE:
    action: escalate_to_user
    display: diverge_gate
    note: "Present contradiction at scope gate"
  E11-TRUNCATION:
    pre_exec:
      action: split_and_retry
    post_exec:
      action: retry_reduced_scope
      max_attempts: 2

post:
  reflection: background
  budget_report: true
