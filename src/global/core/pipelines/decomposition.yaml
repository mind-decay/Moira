# Decomposition Pipeline Definition
# Source: design/architecture/pipelines.md → Decomposition Pipeline
# Trigger: epic task (Art 2.1)

_meta:
  name: decomposition
  description: "Pipeline for epics — decomposes into independent sub-tasks executed via appropriate pipelines"
  trigger:
    size: epic
    confidence: any

steps:
  - id: classification
    agent: apollo
    role: classifier
    mode: foreground
    writes_to: "tasks/{task_id}/classification.md"
    reads_from: "tasks/{task_id}/input.md"

  # Note: No Explorer step at epic level — intentional.
  # Decomposition operates at high-level architecture scope.
  # Each sub-task's pipeline (standard/full) includes its own Explorer step
  # for code-level exploration relevant to that specific sub-task.
  - id: analysis
    agent: athena
    role: analyst
    mode: foreground
    writes_to: "tasks/{task_id}/epic-requirements.md"
    reads_from:
      - "tasks/{task_id}/classification.md"
      - "tasks/{task_id}/input.md"

  - id: architecture
    agent: metis
    role: architect
    mode: foreground
    writes_to: "tasks/{task_id}/epic-architecture.md"
    reads_from:
      - "tasks/{task_id}/epic-requirements.md"
      - "tasks/{task_id}/classification.md"

  - id: decomposition
    agent: daedalus
    role: planner
    mode: foreground
    writes_to:
      - "tasks/{task_id}/decomposition.md"
      - "tasks/{task_id}/queue.yaml"
    reads_from:
      - "tasks/{task_id}/epic-architecture.md"
      - "tasks/{task_id}/epic-requirements.md"
      - "tasks/{task_id}/classification.md"

  - id: implementation
    repeatable_group:
      gate_per_iteration: true
      description: "Each sub-task executes via appropriate pipeline (standard/full)"
      steps:
        - id: implementation
          agent: null
          role: sub-pipeline
          mode: foreground
          writes_to: "tasks/{task_id}/subtasks/{subtask_n}/"
          reads_from:
            - "tasks/{task_id}/decomposition.md"
            - "tasks/{task_id}/epic-architecture.md"

  # D-195: Integration testing via bash build/test step (same as Standard/Full).
  # If integration tests need writing, they're tasks in the final sub-task's plan.
  - id: build_test
    agent: null
    role: build-test-runner
    mode: foreground
    writes_to: "tasks/{task_id}/integration-results.md"
    # Uses config.yaml → tooling.post_implementation[]. If empty, step skipped.
    # If fail → Hephaestus retry (max 2 attempts, then escalate to user).

  - id: completion
    agent: null
    role: final-gate
    mode: foreground
    writes_to: "tasks/{task_id}/telemetry.yaml"
    reads_from:
      - "tasks/{task_id}/integration-results.md"

  # Dynamic checkpoint: Quality Checkpoint (see gates.md) — presented when quality-gate agent returns fail_warning
gates:
  - id: classification_gate
    after_step: classification
    required: true
    options:
      - id: proceed
        description: "Classification correct, continue"
      - id: modify
        description: "Provide different classification"
      - id: abort
        description: "Cancel task"

  # D-085: Architecture gate added — user approves architecture before Planner runs.
  # Prevents wasting Planner tokens on bad architecture for epic tasks.
  - id: architecture_gate
    after_step: architecture
    required: true
    options:
      - id: proceed
        description: "Architecture approved, continue to decomposition"
      - id: details
        description: "Show full architecture reasoning"
      - id: modify
        description: "Request architecture changes"
      - id: abort
        description: "Cancel task"

  - id: decomposition_gate
    after_step: decomposition
    required: true
    options:
      - id: proceed
        description: "Task breakdown approved, begin execution"
      - id: details
        description: "Show full decomposition document"
      - id: modify
        description: "Adjust decomposition"
      - id: rearchitect
        description: "Return to architecture gate (different approach needed)"
      - id: abort
        description: "Cancel task"

  # No "modify" option — sub-task rework is handled within the sub-pipeline's own gates
  - id: per_task_gate
    after_step: "repeatable_group.implementation"
    required: true
    repeating: true
    options:
      - id: proceed
        description: "Sub-task complete, continue to next"
      - id: checkpoint
        description: "Save progress and pause (resumable)"
      - id: abort
        description: "Stop execution"

  - id: final_gate
    after_step: completion
    required: true
    # NOTE: These are completion actions, not gate decisions. Gate is always recorded as "proceed" (see gates.md).
    options:
      - id: done
        description: "Accept result"
      - id: tweak
        description: "Targeted modification"
      - id: redo
        description: "Rollback and redo"
      - id: diff
        description: "Show changes"
      - id: test
        description: "Run additional tests"

  # max_attempts = total executions including original (not retry count)
  # e.g., max_attempts: 3 means original + 2 retries
error_handlers:
  E1-INPUT:
    action: pause
    display: blocked_gate
    escalation: ask_user
  E2-SCOPE:
    action: stop
    display: scope_change_gate
    options:
      - upgrade
      - split
      - reduce
      - continue
  E3-CONFLICT:
    action: stop
    display: conflict_gate
    escalation: user_chooses
  E4-BUDGET:
    pre_exec:
      action: auto_split
    mid_exec:
      action: save_partial
      then: spawn_new_agent
  E5-QUALITY:
    action: retry
    max_attempts: 3
    on_max: escalate
    display: quality_failure_gate
  E6-AGENT:
    action: retry
    max_attempts: 2
    on_max: diagnose_and_escalate
    display: agent_failure_gate
  E7-DRIFT:
    action: log
    blocking: false
    note: "Non-blocking — detection via guard.sh PostToolUse hook"
  E8-STALE:
    action: warn
    display: stale_knowledge_warning
    blocking: false
  E9-SEMANTIC:
    action: retry_with_feedback
    max_attempts: 3
    # Shares retry counter with E5-QUALITY (max_attempts must match)
    note: "Reviewer-detected: E5-QUALITY retry path. Gate-detected: gate modify flow"
  E10-DIVERGE:
    action: escalate_to_user
    display: diverge_gate
    note: "Present contradiction at architecture gate"
  E11-TRUNCATION:
    pre_exec:
      action: split_and_retry
    post_exec:
      action: retry_reduced_scope
      max_attempts: 2

post:
  reflection: epic
  budget_report: true
