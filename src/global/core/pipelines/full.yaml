# Full Pipeline Definition
# Source: design/architecture/pipelines.md → Full Pipeline
# Trigger: large task (Art 2.1)

_meta:
  name: full
  description: "Comprehensive pipeline for large tasks with phased implementation and per-phase gates"
  trigger:
    size: large
    confidence: any

steps:
  - id: classification
    agent: apollo
    role: classifier
    mode: foreground
    writes_to: "tasks/{task_id}/classification.md"
    reads_from: "tasks/{task_id}/input.md"

  - id: exploration
    mode: parallel
    agents:
      - agent: hermes
        role: explorer
        writes_to: "tasks/{task_id}/exploration.md"
      - agent: athena
        role: analyst
        writes_to: "tasks/{task_id}/requirements.md"
    reads_from:
      - "tasks/{task_id}/classification.md"
      - "tasks/{task_id}/input.md"

  - id: architecture
    agent: metis
    role: architect
    mode: foreground
    writes_to:
      - "tasks/{task_id}/architecture.md"
      - "tasks/{task_id}/alternatives.md"
    reads_from:
      - "tasks/{task_id}/exploration.md"
      - "tasks/{task_id}/requirements.md"

  - id: plan
    agent: daedalus
    role: planner
    mode: foreground
    writes_to: "tasks/{task_id}/plan.md"
    reads_from:
      - "tasks/{task_id}/architecture.md"
      - "tasks/{task_id}/exploration.md"
      - "tasks/{task_id}/requirements.md"

  - id: implementation
    repeatable_group:
      gate_per_iteration: true
      steps:
        - id: implementation
          agent: hephaestus
          role: implementer
          mode: foreground
          writes_to: "tasks/{task_id}/phases/{phase_n}/implementation.md"
          reads_from:
            - "tasks/{task_id}/plan.md"
            - "tasks/{task_id}/architecture.md"

        - id: review
          agent: themis
          role: reviewer
          mode: foreground
          writes_to: "tasks/{task_id}/phases/{phase_n}/review.md"
          reads_from: "tasks/{task_id}/phases/{phase_n}/implementation.md"

        - id: testing
          agent: aletheia
          role: tester
          mode: foreground
          writes_to: "tasks/{task_id}/phases/{phase_n}/test-results.md"
          reads_from: "tasks/{task_id}/phases/{phase_n}/implementation.md"

  - id: integration
    agent: aletheia
    role: tester
    mode: foreground
    writes_to: "tasks/{task_id}/integration-results.md"
    reads_from: "tasks/{task_id}/plan.md"

  - id: completion
    agent: null
    role: final-gate
    mode: foreground
    writes_to: "tasks/{task_id}/telemetry.yaml"
    reads_from:
      - "tasks/{task_id}/integration-results.md"

gates:
  - id: classification_gate
    after_step: classification
    required: true
    options:
      - id: proceed
        description: "Classification correct, continue"
      - id: modify
        description: "Provide different classification"
      - id: abort
        description: "Cancel task"

  - id: architecture_gate
    after_step: architecture
    required: true
    variant: alternative_selection  # Full Pipeline: user CHOOSES from alternatives (see gates.md)
    options:
      # Dynamic alternatives from architect output are presented first (1-N)
      # These static options follow the dynamic alternatives:
      - id: details
        description: "Show full reasoning for all alternatives"
      - id: modify
        description: "Provide feedback, request different approaches"
      - id: abort
        description: "Cancel task"

  - id: plan_gate
    after_step: plan
    required: true
    options:
      - id: proceed
        description: "Plan approved, begin phased implementation"
      - id: details
        description: "Show full plan details"
      - id: modify
        description: "Provide feedback for revision"
      - id: rearchitect
        description: "Return to architecture gate (different technical approach)"
      - id: abort
        description: "Cancel task"

  - id: phase_gate
    after_step: "repeatable_group.testing"
    required: true
    repeating: true
    options:
      - id: proceed
        description: "Phase complete, continue to next"
      - id: checkpoint
        description: "Save progress and pause (resumable)"
      - id: abort
        description: "Stop implementation"

  - id: final_gate
    after_step: integration
    required: true
    options:
      - id: done
        description: "Accept result"
      - id: tweak
        description: "Targeted modification"
      - id: redo
        description: "Rollback and redo"
      - id: diff
        description: "Show changes"
      - id: test
        description: "Run additional tests"

error_handlers:
  E1-INPUT:
    action: pause
    display: blocked_gate
    escalation: ask_user
  E2-SCOPE:
    action: stop
    display: scope_change_gate
    options:
      - upgrade
      - split
      - reduce
      - continue
  E3-CONFLICT:
    action: stop
    display: conflict_gate
    escalation: user_chooses
  E4-BUDGET:
    pre_exec:
      action: auto_split
    mid_exec:
      action: save_partial
      then: spawn_new_agent
  E5-QUALITY:
    action: retry
    max_attempts: 2
    on_max: escalate
    display: quality_failure_gate
  E6-AGENT:
    action: retry
    max_attempts: 1
    on_max: diagnose_and_escalate
    display: agent_failure_gate
  E7-DRIFT:
    action: log
    note: "Stub — full detection in Phase 8"
  E8-STALE:
    action: log_and_escalate
    note: "Stub — full detection in Phase 4"
  E9-SEMANTIC:
    action: retry_with_feedback
    max_attempts: 2
    note: "Reviewer-detected: E5-QUALITY retry path. Gate-detected: gate modify flow"
  E10-DIVERGE:
    action: escalate_to_user
    display: diverge_gate
    note: "Present contradiction at architecture gate"
  E11-TRUNCATION:
    pre_exec:
      action: split_and_retry
    post_exec:
      action: retry_reduced_scope
      max_attempts: 2

post:
  reflection: deep
  budget_report: true
