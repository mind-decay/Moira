# Full Pipeline Definition
# Source: design/architecture/pipelines.md → Full Pipeline
# Trigger: large task (Art 2.1)

_meta:
  name: full
  description: "Comprehensive pipeline for large tasks with front-loaded quality and embedded verification (D-193)"
  trigger:
    size: large
    confidence: any

steps:
  - id: classification
    agent: apollo
    role: classifier
    mode: foreground
    writes_to: "tasks/{task_id}/classification.md"
    reads_from: "tasks/{task_id}/input.md"

  - id: exploration
    agent: hermes
    role: explorer
    mode: foreground
    writes_to: "tasks/{task_id}/exploration.md"
    reads_from:
      - "tasks/{task_id}/classification.md"
      - "tasks/{task_id}/input.md"
    # D-189: Hermes includes Q1 gap analysis in exploration.md
    # Athena not dispatched by default; available on-demand via plan gate 'analyze' option

  - id: architecture
    agent: metis
    role: architect
    mode: foreground
    writes_to:
      - "tasks/{task_id}/architecture.md"
      - "tasks/{task_id}/alternatives.md"
    reads_from:
      - "tasks/{task_id}/exploration.md"

  - id: plan
    agent: daedalus
    role: planner
    mode: foreground
    writes_to: "tasks/{task_id}/plan.md"
    reads_from:
      - "tasks/{task_id}/architecture.md"
      - "tasks/{task_id}/exploration.md"
    # D-191: Plan includes embedded verify fields per task

  - id: plan_check
    agent: themis
    role: reviewer
    mode: foreground
    variant: plan_check  # D-190: lightweight plan validation mode
    writes_to: "tasks/{task_id}/plan-check.md"
    reads_from:
      - "tasks/{task_id}/plan.md"
      - "tasks/{task_id}/architecture.md"
      - "tasks/{task_id}/exploration.md"

  # D-193: Implementation batches with embedded verification per task
  # Default: 2 batches. Mid-point gate only when >2 batches.
  # Split threshold: if batch exceeds ~120 tool uses, auto-split.
  - id: implementation
    repeatable_group:
      gate_per_iteration: false  # D-193: no per-phase gate; mid-point gate conditional
      mid_point_gate: true       # D-193: gate after ~50% of batches, only when >2 batches
      steps:
        - id: implementation
          agent: hephaestus
          role: implementer
          mode: foreground
          writes_to: "tasks/{task_id}/phases/{phase_n}/implementation.md"
          reads_from:
            - "tasks/{task_id}/plan.md"
            - "tasks/{task_id}/architecture.md"
          # D-191: Hephaestus runs <verify> per task within implementation
          # D-192: Analysis paralysis guard active

  # D-191, D-194: Bash build/test step runs BEFORE final review.
  # Ensures Themis reviews code that compiles and passes tests.
  # Uses config.yaml → tooling.post_implementation[]. If empty, step skipped.
  # If fail → Hephaestus retry (max 2 attempts, then escalate to user).
  - id: build_test
    agent: null
    role: build-test-runner
    mode: foreground
    writes_to: "tasks/{task_id}/test-results.md"

  - id: final_review
    agent: themis
    role: reviewer
    mode: foreground
    writes_to: "tasks/{task_id}/review.md"
    reads_from:
      - "tasks/{task_id}/plan.md"
      - "tasks/{task_id}/architecture.md"
      - "tasks/{task_id}/test-results.md"
      # Reads all phases/{phase_n}/implementation.md
      # D-194: Reviews code known to build and pass tests

  - id: completion
    agent: null
    role: final-gate
    mode: foreground
    writes_to: "tasks/{task_id}/telemetry.yaml"
    reads_from:
      - "tasks/{task_id}/review.md"
      - "tasks/{task_id}/test-results.md"

  # Dynamic checkpoint: Quality Checkpoint (see gates.md) — presented when quality-gate agent returns fail_warning
gates:
  - id: classification_gate
    after_step: classification
    required: true
    options:
      - id: proceed
        description: "Classification correct, continue"
      - id: modify
        description: "Provide different classification"
      - id: abort
        description: "Cancel task"

  - id: architecture_gate
    after_step: architecture
    required: true
    variant: alternative_selection  # See gates.md lines 139-147 for dynamic alternative presentation
    options:
      # Dynamic alternatives from architect output are presented first (1-N)
      # These static options follow the dynamic alternatives:
      - id: proceed
        description: "Select alternative N (dynamic — from architect output)"
      - id: details
        description: "Show full reasoning for all alternatives"
      - id: modify
        description: "Provide feedback, request different approaches"
      - id: abort
        description: "Cancel task"

  # D-190, D-193: Plan gate now includes plan-check findings
  - id: plan_gate
    after_step: plan_check
    required: true
    options:
      - id: proceed
        description: "Plan approved, begin implementation"
      - id: details
        description: "Show full plan details + plan-check findings"
      - id: modify
        description: "Provide feedback for plan revision"
      - id: rearchitect
        description: "Return to architecture gate (different technical approach)"
      - id: analyze
        description: "Dispatch Athena for detailed requirements analysis (D-189)"
      - id: abort
        description: "Cancel task"

  # D-193: Conditional mid-point gate, only when >2 batches
  - id: mid_point_gate
    after_step: "repeatable_group.implementation"
    required: false  # Only fires when >2 batches
    condition: "batch_count > 2 AND current_batch == ceil(batch_count / 2)"
    options:
      - id: proceed
        description: "Continue to remaining batches"
      - id: checkpoint
        description: "Save progress and pause (resumable)"
      - id: modify
        description: "Rework completed batches"
        action: "Re-dispatch implementation agents with user feedback"
      - id: abort
        description: "Stop implementation"

  - id: final_gate
    after_step: completion
    required: true
    # NOTE: These are completion actions, not gate decisions. Gate is always recorded as "proceed" (see gates.md).
    options:
      - id: done
        description: "Accept result"
      - id: tweak
        description: "Targeted modification"
      - id: redo
        description: "Rollback and redo"
      - id: diff
        description: "Show changes"
      - id: test
        description: "Run additional tests (dispatches Aletheia ad-hoc)"

  # max_attempts = total executions including original (not retry count)
  # e.g., max_attempts: 3 means original + 2 retries
error_handlers:
  E1-INPUT:
    action: pause
    display: blocked_gate
    escalation: ask_user
  E2-SCOPE:
    action: stop
    display: scope_change_gate
    options:
      - upgrade
      - split
      - reduce
      - continue
  E3-CONFLICT:
    action: stop
    display: conflict_gate
    escalation: user_chooses
  E4-BUDGET:
    pre_exec:
      action: auto_split
    mid_exec:
      action: save_partial
      then: spawn_new_agent
  E5-QUALITY:
    action: retry
    max_attempts: 3
    on_max: escalate
    display: quality_failure_gate
  E6-AGENT:
    action: retry
    max_attempts: 2
    on_max: diagnose_and_escalate
    display: agent_failure_gate
  E7-DRIFT:
    action: log
    blocking: false
    note: "Non-blocking — detection via guard.sh PostToolUse hook"
  E8-STALE:
    action: warn
    display: stale_knowledge_warning
    blocking: false
  E9-SEMANTIC:
    action: retry_with_feedback
    max_attempts: 3
    # Shares retry counter with E5-QUALITY (max_attempts must match)
    note: "Reviewer-detected: E5-QUALITY retry path. Gate-detected: gate modify flow"
  E10-DIVERGE:
    action: escalate_to_user
    display: diverge_gate
    note: "Present contradiction at architecture gate"
  E11-TRUNCATION:
    pre_exec:
      action: split_and_retry
    post_exec:
      action: retry_reduced_scope
      max_attempts: 2

post:
  reflection: deep
  budget_report: true
