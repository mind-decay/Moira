# Field names using dot-notation (e.g., budgets.per_agent.classifier) represent YAML nested keys.
_meta:
  name: config
  file: config.yaml
  location: .claude/moira/
  git: committed
  description: Project configuration

fields:
  version:
    type: string
    required: true
    default: "1.0"
  project.name:
    type: string
    required: true
    default: ""
  project.root:
    type: string
    required: true
    default: ""
  project.stack:
    type: string
    required: true
    default: generic
  # Reserved -- not yet read by orchestrator. Pipeline selection is a pure function of classifier output (Art 2.1). Target activation: Phase 12+.
  classification.default_pipeline:
    type: enum
    required: false
    enum: [quick, standard, full, decomposition]
    default: standard
  # Reserved -- not yet read by orchestrator. Pipeline selection is a pure function of classifier output (Art 2.1). Target activation: Phase 12+.
  classification.size_hints_override:
    type: boolean
    required: false
    default: false
  # Note: classification confidence is classifier-determined only and not configurable.
  # Gates are fixed per Art 2.2 — defined in pipeline YAML definitions only, not configurable
  pipelines.quick.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence. Target activation: Phase 12.
    type: number
    required: false
    default: 1
  pipelines.standard.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence. Target activation: Phase 12.
    type: number
    required: false
    default: 2
  pipelines.full.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence. Target activation: Phase 12.
    type: number
    required: false
    default: 2
  pipelines.decomposition.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence. Target activation: Phase 12.
    type: number
    required: false
    default: 2
  budgets.orchestrator_max_percent:
    # This marks the healthy/monitor boundary (25%), not a hard maximum.
    # Actual warning threshold is 40% and critical is 60% (see orchestrator.md Section 6).
    type: number
    required: false
    default: 25
    description: "Reserved — will replace hardcoded 25% threshold in budget.sh and orchestrator.md in a future phase"
  budgets.agent_max_load_percent:
    type: number
    required: false
    default: 70
  # These defaults must match budgets.schema.yaml agent_budgets.*. budget.sh reads budgets.yaml first with config.yaml as fallback.
  budgets.per_agent.classifier:
    type: number
    required: false
    default: 20000
  budgets.per_agent.explorer:
    type: number
    required: false
    default: 140000
  budgets.per_agent.analyst:
    type: number
    required: false
    default: 80000
  budgets.per_agent.architect:
    type: number
    required: false
    default: 100000
  budgets.per_agent.planner:
    type: number
    required: false
    default: 70000
  budgets.per_agent.implementer:
    type: number
    required: false
    default: 120000
  budgets.per_agent.reviewer:
    type: number
    required: false
    default: 100000
  budgets.per_agent.tester:
    type: number
    required: false
    default: 90000
  budgets.per_agent.reflector:
    type: number
    required: false
    default: 80000
  budgets.per_agent.auditor:
    type: number
    required: false
    default: 140000
  quality.mode:
    type: enum
    required: false
    enum: [conform, evolve]
    default: conform
  quality.evolution.current_target:
    type: string
    required: false
    default: ""
    description: "Pattern currently being evolved (empty = none)"
  quality.evolution.cooldown_remaining:
    type: number
    required: false
    default: 0
    description: "Tasks remaining in post-evolution cooldown (0 = not in cooldown)"
  knowledge.freshness_confidence_threshold:
    type: number
    required: false
    default: 30
    description: "Minimum confidence percentage (exponential decay model). Entries below this are flagged stale."
  # Reserved -- not yet enforced by knowledge archival system.
  knowledge.archival_max_entries:
    type: number
    required: false
    default: 100
  audit.light_every_n_tasks:
    type: number
    required: false
    default: 10
  audit.standard_every_n_tasks:
    type: number
    required: false
    default: 20
  # Reserved -- not yet read by audit system. Target activation: Phase 12+.
  audit.auto_batch_apply_risk:
    type: enum
    required: false
    enum: [low, medium, high]
    default: low
  mcp.enabled:
    type: boolean
    required: false
    default: false
  mcp.registry_path:
    # Reserved -- currently hardcoded in mcp.sh. Will be read from config in a future phase.
    type: string
    required: false
    default: config/mcp-registry.yaml
  hooks.guard_enabled:
    type: boolean
    required: false
    default: true
  hooks.budget_tracking_enabled:
    type: boolean
    required: false
    default: true
  tooling.post_implementation:
    type: array
    required: false
    default: []
    description: "Shell commands to run after implementation (e.g., typecheck, lint, type generation). Implementer runs these and fixes errors before returning. Empty = no validation. (not yet active — future: injected into implementer prompts via dispatch.md)"
  bootstrap.quick_scan_completed:
    type: boolean
    required: false
    default: false
  bootstrap.quick_scan_at:
    type: string
    required: false
    default: ""
  bootstrap.deep_scan_completed:
    type: boolean
    required: false
    default: false
  bootstrap.deep_scan_pending:
    type: boolean
    required: false
    default: false
    description: "Set to true by bootstrap; cleared by orchestrator at first pipeline run."
  graph.enabled:
    type: boolean
    required: false
    default: true
    description: "Whether graph integration is active (true if ariadne found during init)"
  graph.timeout:
    type: number
    required: false
    default: 60
    description: "ariadne build timeout in seconds"
  logs.rotation_threshold_lines:
    type: number
    required: false
    default: 5000
    description: "Rotate log files when they exceed this many lines. Checked at task start."
  logs.archive_dir:
    type: string
    required: false
    default: "state/archive"
    description: "Directory for archived log files, relative to .claude/moira/"
