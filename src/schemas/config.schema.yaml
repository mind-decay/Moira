_meta:
  name: config
  file: config.yaml
  location: .claude/moira/
  git: committed
  description: Project configuration

fields:
  version:
    type: string
    required: true
    default: "1.0"
  project.name:
    type: string
    required: true
    default: ""
  project.root:
    type: string
    required: true
    default: ""
  project.stack:
    type: string
    required: true
    default: generic
  classification.default_pipeline:
    type: enum
    required: false
    enum: [quick, standard, full, decomposition]
    default: standard
  classification.size_hints_override:
    type: boolean
    required: false
    default: false
  # Gates are fixed per Art 2.2 — defined in pipeline YAML definitions only, not configurable
  pipelines.quick.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence.
    type: number
    required: false
    default: 1
  pipelines.standard.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence.
    type: number
    required: false
    default: 2
  pipelines.full.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence.
    type: number
    required: false
    default: 2
  pipelines.decomposition.max_retries:
    # Reserved — not yet read by orchestrator. Pipeline YAML max_attempts takes precedence.
    type: number
    required: false
    default: 2
  budgets.orchestrator_max_percent:
    type: number
    required: false
    default: 25
    description: "Reserved — will replace hardcoded 25% threshold in budget.sh and orchestrator.md in a future phase"
  budgets.agent_max_load_percent:
    type: number
    required: false
    default: 70
  budgets.per_agent.classifier:
    type: number
    required: false
    default: 20000
  budgets.per_agent.explorer:
    type: number
    required: false
    default: 140000
  budgets.per_agent.analyst:
    type: number
    required: false
    default: 80000
  budgets.per_agent.architect:
    type: number
    required: false
    default: 100000
  budgets.per_agent.planner:
    type: number
    required: false
    default: 70000
  budgets.per_agent.implementer:
    type: number
    required: false
    default: 120000
  budgets.per_agent.reviewer:
    type: number
    required: false
    default: 100000
  budgets.per_agent.tester:
    type: number
    required: false
    default: 90000
  budgets.per_agent.reflector:
    type: number
    required: false
    default: 80000
  budgets.per_agent.auditor:
    type: number
    required: false
    default: 140000
  quality.mode:
    type: enum
    required: false
    enum: [conform, evolve]
    default: conform
  quality.evolution.current_target:
    type: string
    required: false
    default: ""
    description: "Pattern currently being evolved (empty = none)"
  quality.evolution.cooldown_remaining:
    type: number
    required: false
    default: 0
    description: "Tasks remaining in post-evolution cooldown (0 = not in cooldown)"
  knowledge.freshness_days:
    type: number
    required: false
    default: 30
  knowledge.archival_max_entries:
    type: number
    required: false
    default: 100
  audit.light_every_n_tasks:
    type: number
    required: false
    default: 10
  audit.standard_every_n_tasks:
    type: number
    required: false
    default: 20
  audit.auto_batch_apply_risk:
    type: enum
    required: false
    enum: [low, medium, high]
    default: low
  mcp.enabled:
    type: boolean
    required: false
    default: false
  mcp.registry_path:
    type: string
    required: false
    default: config/mcp-registry.yaml
  hooks.guard_enabled:
    type: boolean
    required: false
    default: true
  hooks.budget_tracking_enabled:
    type: boolean
    required: false
    default: true
  tooling.post_implementation:
    type: array
    required: false
    default: []
    description: "Shell commands to run after implementation (e.g., typecheck, lint, type generation). Implementer runs these and fixes errors before returning. Empty = no validation. (not yet active — future: injected into implementer prompts via dispatch.md)"
  bootstrap.quick_scan_completed:
    type: boolean
    required: false
    default: false
  bootstrap.quick_scan_at:
    type: string
    required: false
    default: ""
  bootstrap.deep_scan_completed:
    type: boolean
    required: false
    default: false
  bootstrap.deep_scan_pending:
    type: boolean
    required: false
    default: false
    description: "Set to true by bootstrap; cleared by orchestrator at first pipeline run."
