_meta:
  name: status
  file: status.yaml
  location: .moira/state/tasks/{task_id}/
  git: gitignored
  description: Per-task status

fields:
  task_id:
    type: string
    required: true
  description:
    type: string
    required: true
    default: ""
  size:
    type: enum
    required: true
    enum: [small, medium, large, epic]
  confidence:
    type: enum
    required: true
    enum: [high, low]
  pipeline:
    type: enum
    required: true
    enum: [quick, standard, full, decomposition]
  developer:
    type: string
    required: true
    default: ""
  status:
    type: enum
    required: false
    enum: [pending, in_progress, completed, failed, aborted]
    default: pending
  created_at:
    type: string
    required: true
  completed_at:
    type: string
    required: false
    default: null
  git.pre_task_head:
    type: string
    required: false
    default: null
    description: "Git HEAD SHA at task start, used for diff computation by checkpoint and tweak flows"
  classification.classifier_size:
    type: enum
    required: false
    enum: [small, medium, large, epic]
  classification.classifier_confidence:
    type: enum
    required: false
    enum: [high, low]
  classification.user_hint:
    type: string
    required: false
    default: null
  classification.overridden:
    type: boolean
    required: false
    default: false
  classification.reasoning:
    type: string
    required: false
    default: ""
  artifacts:
    type: block
    required: false
    default: null
  gates:
    description: "Gate decisions recorded during pipeline execution"
    type: block
    required: false
    default: null
    item_schema:
      gate: "Gate name (e.g., classification_gate, architecture_gate)"
      decision: "enum: [proceed, modify, abort]"
      at: "ISO 8601 timestamp"
      note: "Optional user feedback or annotation"
  retries:
    description: "Retry counters for error recovery tracking"
    type: block
    required: false
    default: null
    fields:
      quality:
        type: number
        default: 0
        description: "Quality gate retry count (E5-QUALITY)"
      agent_failures:
        type: number
        default: 0
        description: "Agent failure retry count (E6-AGENT)"
      budget_splits:
        type: number
        default: 0
        description: "Budget split retry count (E4-BUDGET)"
      total:
        type: number
        default: 0
        description: "Sum of all retry counters"
  budget.estimated_tokens:
    type: number
    required: false
    default: 0
  budget.actual_tokens:
    type: number
    required: false
    default: 0
  budget.by_agent:
    type: block
    required: false
    default: null
  warnings:
    description: "Stale knowledge entries and other non-blocking warnings (E8-STALE)"
    type: block
    required: false
    default: null
    item_schema:
      type: "Warning type (e.g., stale_knowledge)"
      entry: "Affected knowledge entry path"
      last_task: "Task ID when entry was last updated"
      distance: "Number of tasks since last update"
  gate_interactions:
    description: "Per-input gate interaction records for classification and routing traceability (Art 3.1, D-138)"
    type: array
    required: false
    default: []
    item_fields:
      gate_id:
        type: string
        required: true
        description: "Gate identifier (e.g., classification_gate, architecture_gate)"
      input_text:
        type: string
        required: true
        description: "Full user input text"
      category:
        type: enum
        required: true
        enum: [menu_selection, feedback_as_selection, question, contextual_instruction, ambiguous_typo]
        description: "Classification result"
      feedback_buffer:
        type: array
        required: false
        default: []
        description: "Snapshot of accumulated feedback buffer at time of this interaction"
        item_type: string
      notes:
        type: string
        required: false
        default: ""
        description: "Contextual notes (clarifications provided, gate name, reprompt count)"
  completion.action:
    type: enum
    required: false
    enum: [done, tweak, redo, diff, test, abort]
    default: null
    description: "Records the last user action including intermediate actions (diff, test). For terminal-only actions, see telemetry.schema.yaml quality.final_result."
  completion.tweak_count:
    type: number
    required: false
    default: 0
  completion.redo_count:
    type: number
    required: false
    default: 0
  completion.final_review_passed:
    type: boolean
    required: false
    default: false
