# Telemetry Schema — Per-Task Metrics
# Source: design/subsystems/testing.md → Per-Task Telemetry Format
# Privacy: numbers and enums only, never content strings (D-027)
# Written at pipeline completion to: state/tasks/{id}/telemetry.yaml

_meta:
  name: telemetry
  file: telemetry.yaml
  location: .claude/moira/state/tasks/{task_id}/
  git: gitignored
  version: "1.0"
  description: "Per-task execution telemetry for live metrics collection"

fields:
  task_id:
    type: string
    required: true
    description: "Task identifier (task-YYYY-MM-DD-NNN)"

  timestamp:
    type: string
    required: true
    description: "ISO 8601 completion timestamp"

  moira_version:
    type: string
    required: true
    description: "Moira version at time of execution"

  # --- Pipeline ---
  pipeline.type:
    type: enum
    enum: [quick, standard, full, decomposition]
    required: true
    description: "Pipeline type used"
  pipeline.classification_confidence:
    type: enum
    enum: [high, low]
    required: true
    description: "Classifier confidence level"
  pipeline.classification_correct:
    type: boolean
    required: false
    default: null
    description: "Whether classification was correct (set by reflector)"

  # --- Execution ---
  execution.agents_called:
    type: array
    required: true
    description: "Per-agent execution records"
    item_fields:
      role:
        type: enum
        enum: [classifier, explorer, analyst, architect, planner, implementer, reviewer, tester, reflector, auditor]
        required: true
      status:
        type: enum
        enum: [success, failure, blocked, budget_exceeded]
        required: true
      context_pct:
        type: number
        required: false
        description: "Estimated context usage percentage"
      duration_sec:
        type: number
        required: false
        description: "Execution duration in seconds"
  execution.gates:
    type: array
    required: true
    description: "Gate decision records"
    item_fields:
      name:
        type: string
        required: true
        description: "Gate name — base names (classification_gate, architecture_gate, etc.) may have numeric suffixes for repeating gates"
      result:
        type: enum
        enum: [proceed, modify, abort]
        required: true
        description: "Gate decision"
      retry_count:
        type: number
        required: false
        default: 0
  execution.retries_total:
    type: number
    required: true
    default: 0
    description: "Total retry count across all error types"
  execution.budget_total_tokens:
    type: number
    required: false
    default: 0
    description: "Estimated total token usage across all agents"

  # --- Quality ---
  quality.reviewer_findings.critical:
    type: number
    required: false
    default: 0
  quality.reviewer_findings.warning:
    type: number
    required: false
    default: 0
  quality.reviewer_findings.suggestion:
    type: number
    required: false
    default: 0
  quality.first_pass_accepted:
    type: boolean
    required: false
    description: "Whether reviewer accepted on first pass"
  # Final results only — diff/test are intermediate actions that loop back to final gate
  quality.final_result:
    type: enum
    enum: [done, tweak, redo, abort]
    required: true
    description: "Final completion action chosen by user"

  # --- Compliance ---
  compliance.orchestrator_violation_count:
    type: number
    required: true
    default: 0
    description: "Count of orchestrator tool-use violations detected by guard.sh"

  # --- Structural ---
  structural.constitutional_pass:
    type: boolean
    required: true
    description: "Whether all constitutional invariants held"
  structural.violations:
    type: array
    required: true
    default: []
    description: "List of constitutional violation codes (if any)"
    item_type: string
    item_pattern: "Art-[0-9]+\\.[0-9]+"

  # --- Budget Accuracy ---
  # Dynamic keys: agent role names (explorer, implementer, etc.)
  # Each has:
  #   estimated_pct: number — estimated context usage percentage
  #   actual_pct: number — actual context usage percentage
  #   error: number — error ratio × 10000 ((actual-estimated)/estimated)
  budget_accuracy:
    type: block
    required: false
    description: "Per-agent budget estimation accuracy for adaptive margin computation"

  # --- MCP Calls ---
  mcp_calls:
    type: array
    required: false
    description: "MCP tool calls made during this task"
    item_fields:
      server:
        type: string
        required: true
      tool:
        type: string
        required: true
      query_summary:
        type: string
        required: true
        description: "Sanitized query pattern (privacy per D-027)"
      tokens_used:
        type: number
        required: true
      agent:
        type: string
        required: true
        description: "Which agent made the call"
