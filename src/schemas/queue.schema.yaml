_meta:
  name: queue
  file: queue.yaml
  location: .moira/state/
  git: gitignored
  description: Epic task queue

fields:
  epic_id:
    type: string
    required: true
  description:
    type: string
    required: true
    default: ""
  created_at:
    type: string
    required: true
  developer:
    type: string
    required: true
    default: ""
  tasks:
    type: block
    required: false
    default: null
  progress.total:
    type: number
    required: false
    default: 0
  progress.completed:
    type: number
    required: false
    default: 0
  progress.in_progress:
    type: number
    required: false
    default: 0
  progress.pending:
    type: number
    required: false
    default: 0
  progress.failed:
    type: number
    required: false
    default: 0
