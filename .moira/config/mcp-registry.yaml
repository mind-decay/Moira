# MCP Tools Registry
# Generated by /moira:init — edit to customize tool guidelines

servers:
  ariadne:
    type: graph
    infrastructure: true
    tools:
      blast-radius:
        purpose: "Find files affected by changing a given file. Accepts optional symbol parameter for function-level precision."
        cost: low
        reliability: high
        when_to_use: "Before modifying a file to understand impact"
        when_NOT_to_use: "Never — always useful for impact analysis"
        token_estimate: 500
      dependencies:
        purpose: "List direct dependencies of a file. Includes symbol_edges for cross-file symbol relationships."
        cost: low
        reliability: high
        when_to_use: "When exploring what a file imports/depends on"
        when_NOT_to_use: "When you already have the file open and can see imports"
        token_estimate: 300
      dependents:
        purpose: "List files that depend on a given file"
        cost: low
        reliability: high
        when_to_use: "When assessing who uses a module before changing its API"
        when_NOT_to_use: "For broad exploration — use blast-radius instead"
        token_estimate: 300
      cycles:
        purpose: "Detect circular dependencies involving a file or cluster"
        cost: low
        reliability: high
        when_to_use: "When reviewing architecture or checking for circular imports"
        when_NOT_to_use: "For unrelated tasks — cycles are a structural concern"
        token_estimate: 400
      cluster:
        purpose: "Get files and metrics for a specific cluster"
        cost: low
        reliability: high
        when_to_use: "When exploring a module/domain to understand its scope"
        when_NOT_to_use: "When you already have the cluster view from static views"
        token_estimate: 500
      smells:
        purpose: "Detect architectural anti-patterns (god files, bottlenecks)"
        cost: low
        reliability: high
        when_to_use: "During architecture review or when reviewing large changes"
        when_NOT_to_use: "For small, localized changes"
        token_estimate: 400
      symbols:
        purpose: "List all symbols in a file (functions, classes, types) with kinds, visibility, and line spans"
        cost: low
        reliability: high
        when_to_use: "When you need to know what a file exports/defines without reading it"
        when_NOT_to_use: "When you already have the file open — just read it"
        token_estimate: 500
      symbol-search:
        purpose: "Search for symbols across the project by name substring and optional kind filter"
        cost: low
        reliability: high
        when_to_use: "When looking for a function, class, or type by name — faster and more precise than grep"
        when_NOT_to_use: "When searching for non-symbol text (comments, strings, config values)"
        token_estimate: 500
      callers:
        purpose: "Find all cross-file call sites of a specific symbol"
        cost: low
        reliability: high
        when_to_use: "When verifying all call sites are updated after changing a function signature"
        when_NOT_to_use: "When you need intra-file references — use grep instead"
        token_estimate: 400
      callees:
        purpose: "Find all cross-file symbols called by a specific function"
        cost: low
        reliability: high
        when_to_use: "When understanding what a function depends on across files"
        when_NOT_to_use: "When you need intra-file call flow"
        token_estimate: 400
      symbol-blast-radius:
        purpose: "Trace transitive callers of a symbol through the call graph"
        cost: low
        reliability: high
        when_to_use: "When assessing the impact of changing a specific function or method"
        when_NOT_to_use: "For file-level impact — use blast-radius without symbol parameter"
        token_estimate: 600
      context:
        purpose: "Assemble optimal file context for a task within a token budget, ranked by relevance"
        cost: medium
        reliability: high
        when_to_use: "When assembling implementation context — replaces multiple individual file/dependency queries"
        when_NOT_to_use: "For quick single-file lookups — use file or dependencies instead"
        token_estimate: 3000
      tests-for:
        purpose: "Identify test files for given source files via dependency edges and name heuristics"
        cost: low
        reliability: high
        when_to_use: "Before writing tests — check what test coverage already exists"
        when_NOT_to_use: "When you already know the test file location"
        token_estimate: 400
      reading-order:
        purpose: "Get optimal file reading order (topological sort) for understanding an area"
        cost: low
        reliability: high
        when_to_use: "When exploring an unfamiliar area — provides structured understanding path"
        when_NOT_to_use: "When you already understand the area or need only one file"
        token_estimate: 500
      plan-impact:
        purpose: "Analyze impact of planned changes: blast radius, affected tests, risk assessment"
        cost: medium
        reliability: high
        when_to_use: "During requirements/planning to assess structural impact before implementation"
        when_NOT_to_use: "After implementation — use diff tool instead to see actual changes"
        token_estimate: 1000
      annotate:
        purpose: "Add or update annotation on a file, cluster, symbol, or edge target"
        cost: low
        reliability: high
        when_to_use: "When marking tech-debt, architectural notes, or needs-refactor tags on graph elements"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 300
      annotations:
        purpose: "List annotations with optional tag and target filters"
        cost: low
        reliability: high
        when_to_use: "When checking existing annotations on files, clusters, or symbols"
        when_NOT_to_use: "When you only need file-level info — annotations are included in ariadne_file responses"
        token_estimate: 500
      remove-annotation:
        purpose: "Remove an annotation by ID"
        cost: low
        reliability: high
        when_to_use: "When cleaning up stale or incorrect annotations"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 200
      bookmark:
        purpose: "Create a named subgraph bookmark for later reference in context and subgraph queries"
        cost: low
        reliability: high
        when_to_use: "When creating task-scoped bookmarks for downstream agents to use in ariadne_context calls"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 300
      bookmarks:
        purpose: "List all bookmarks"
        cost: low
        reliability: high
        when_to_use: "When checking existing bookmarks before creating duplicates"
        when_NOT_to_use: "Never — always safe to check existing bookmarks"
        token_estimate: 300
      remove-bookmark:
        purpose: "Remove a bookmark by name"
        cost: low
        reliability: high
        when_to_use: "When cleaning up task-scoped bookmarks after task completion"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 200
      churn:
        purpose: "Files ranked by change frequency for a given period (30d, 90d, 1y)"
        cost: low
        reliability: high
        when_to_use: "When assessing file stability or identifying frequently-changed areas"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      coupling:
        purpose: "Co-change pairs above a confidence threshold — files that change together"
        cost: low
        reliability: high
        when_to_use: "When looking for implicit coupling between files that may not have import links"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      hotspots:
        purpose: "Files ranked by composite risk: churn x LOC x blast_radius"
        cost: low
        reliability: high
        when_to_use: "When identifying high-risk files that are both frequently changed and structurally important"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      ownership:
        purpose: "Authors and contributors per file or project-wide"
        cost: low
        reliability: high
        when_to_use: "When identifying domain experts or understanding knowledge distribution across files"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      hidden-deps:
        purpose: "Co-change pairs with NO structural import link — hidden dependencies"
        cost: low
        reliability: high
        when_to_use: "When looking for invisible coupling that structural analysis misses"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 400
  ariadne:
    type: code
    tools:
      ariadne_overview:
        purpose: "Project summary: node/edge counts, language breakdown, layer distribution, critical files, cycles count, max depth"
        cost: low
        reliability: high
        when_to_use: "Initial project orientation, understanding project scale and structure at a glance"
        when_NOT_to_use: "When you need details about specific files or dependencies"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_context:
        purpose: "Assemble optimal file context for a task, ranked by relevance to seed files within a token budget"
        cost: medium
        reliability: high
        when_to_use: "Before implementing changes — to identify which files are relevant to a task"
        when_NOT_to_use: "When you already know exactly which files to read"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_blast_radius:
        purpose: "Reverse BFS: map of files affected by changes to a given file, with distances"
        cost: medium
        reliability: high
        when_to_use: "Impact analysis before modifying a file; understanding ripple effects of a change"
        when_NOT_to_use: "When exploring project structure without a specific change target"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_dependencies:
        purpose: "Direct dependencies of a file — incoming, outgoing, or both"
        cost: low
        reliability: high
        when_to_use: "Understanding what a file imports or what imports it"
        when_NOT_to_use: "When you need transitive (multi-hop) dependency information"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_callers:
        purpose: "Cross-file callers of a symbol: which files import/reference a specific symbol"
        cost: low
        reliability: high
        when_to_use: "Tracing usage of a function, class, or variable across the project"
        when_NOT_to_use: "When looking for file-level dependencies rather than symbol-level"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_callees:
        purpose: "Cross-file callees of a symbol: which files/symbols a given symbol imports"
        cost: low
        reliability: high
        when_to_use: "Understanding what a specific function or class depends on"
        when_NOT_to_use: "When looking for file-level dependencies rather than symbol-level"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_cycles:
        purpose: "All strongly connected components (circular dependencies) in the project"
        cost: low
        reliability: high
        when_to_use: "Detecting circular dependencies; architecture quality assessment"
        when_NOT_to_use: "When circular dependencies are not a concern"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_hotspots:
        purpose: "High-risk change hotspots: files with high combined churn, size, and blast radius"
        cost: medium
        reliability: high
        when_to_use: "Identifying risky files before refactoring; quality assessment"
        when_NOT_to_use: "When you need details about a specific file rather than risk overview"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_metrics:
        purpose: "Martin metrics per cluster: instability, abstractness, distance from main sequence, zone classification"
        cost: medium
        reliability: high
        when_to_use: "Architecture quality analysis; identifying zones of pain or uselessness"
        when_NOT_to_use: "When you need file-level rather than cluster-level analysis"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_cluster:
        purpose: "Cluster detail: files, internal/external deps, cohesion"
        cost: medium
        reliability: high
        when_to_use: "Understanding a specific module/cluster's composition and boundaries"
        when_NOT_to_use: "When you need project-wide view rather than single cluster detail"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_coupling:
        purpose: "Co-change coupling from git history: file pairs that frequently change together"
        cost: medium
        reliability: high
        when_to_use: "Detecting implicit coupling; finding files that should be co-located or abstracted"
        when_NOT_to_use: "On projects with very short git history"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_layers:
        purpose: "Topological layers: files grouped by architectural depth level"
        cost: medium
        reliability: high
        when_to_use: "Understanding architectural layering; detecting layer violations"
        when_NOT_to_use: "When you need file-specific detail rather than layer overview"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_boundaries:
        purpose: "All detected semantic boundaries (HTTP routes, event channels) grouped by file"
        cost: low
        reliability: high
        when_to_use: "Discovering API surfaces and event-driven interfaces in the project"
        when_NOT_to_use: "On projects without HTTP routes or event systems"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_boundary_for:
        purpose: "Semantic boundaries (routes, events) defined in a specific file"
        cost: low
        reliability: high
        when_to_use: "Checking what API endpoints or events a specific file defines"
        when_NOT_to_use: "When you need project-wide boundary overview"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_smells:
        purpose: "Detect architectural smells: god files, circular deps, layer violations, hub-and-spoke, etc."
        cost: medium
        reliability: high
        when_to_use: "Architecture quality audit; identifying structural problems"
        when_NOT_to_use: "When looking for specific functional issues rather than structural problems"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_centrality:
        purpose: "Bottleneck files sorted by betweenness centrality score"
        cost: low
        reliability: high
        when_to_use: "Identifying architectural bottlenecks and critical path files"
        when_NOT_to_use: "When you need usage-based importance rather than structural centrality"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_churn:
        purpose: "File change frequency from git history: commit counts, lines changed, authors per file"
        cost: medium
        reliability: high
        when_to_use: "Identifying frequently changing files; correlating with hotspots"
        when_NOT_to_use: "On projects with very short git history"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_compressed:
        purpose: "Hierarchical graph compression at 3 levels: project overview, cluster detail, file neighborhood"
        cost: medium
        reliability: high
        when_to_use: "Progressive drill-down into project structure; understanding architecture at different zoom levels"
        when_NOT_to_use: "When you need raw dependency data rather than compressed views"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_importance:
        purpose: "Files ranked by combined importance score (betweenness centrality + PageRank)"
        cost: low
        reliability: high
        when_to_use: "Identifying the most architecturally important files in the project"
        when_NOT_to_use: "When you need specific dependency information rather than rankings"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_spectral:
        purpose: "Spectral analysis: algebraic connectivity, monolith score, natural graph bisection"
        cost: low
        reliability: high
        when_to_use: "Assessing overall project modularity; detecting monolith vs modular structure"
        when_NOT_to_use: "When you need actionable file-level information"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_file:
        purpose: "File detail: type, layer, arch_depth, exports, cluster, centrality, incoming/outgoing edges"
        cost: low
        reliability: high
        when_to_use: "Getting comprehensive metadata about a specific file"
        when_NOT_to_use: "When you need to read the file contents (use Read tool instead)"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_subgraph:
        purpose: "Extract filtered subgraph: nodes + edges + clusters in the neighborhood of given files"
        cost: medium
        reliability: high
        when_to_use: "Visualizing or analyzing the local dependency graph around specific files"
        when_NOT_to_use: "When you need project-wide graph rather than local neighborhood"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_reading_order:
        purpose: "Topologically sorted reading order for understanding a set of files"
        cost: low
        reliability: high
        when_to_use: "Determining optimal order to read files for understanding a subsystem"
        when_NOT_to_use: "When you already know the dependency order"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_route_map:
        purpose: "HTTP route map: routes grouped by path, showing handler and consumer files"
        cost: low
        reliability: high
        when_to_use: "Understanding API surface; mapping routes to handlers"
        when_NOT_to_use: "On projects without HTTP routes"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_event_map:
        purpose: "Event channel map: events grouped by name, showing producer and consumer files"
        cost: low
        reliability: high
        when_to_use: "Understanding event-driven architecture; mapping event producers to consumers"
        when_NOT_to_use: "On projects without event systems"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_diff:
        purpose: "Structural diff since last auto-update: added/removed nodes and edges, new/resolved cycles and smells"
        cost: low
        reliability: high
        when_to_use: "After code changes, to see what structural impacts occurred"
        when_NOT_to_use: "When the graph has not been updated since last check"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_annotate:
        purpose: "Add or update an annotation (label/tag) on a graph element (file, cluster, or edge)"
        cost: low
        reliability: high
        when_to_use: "Marking files with metadata like 'entry-point', 'deprecated', 'hot-path'"
        when_NOT_to_use: "When you only need to read annotations (use ariadne_annotations instead)"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_annotations:
        purpose: "List annotations with optional filters by label, target type, or target path"
        cost: low
        reliability: high
        when_to_use: "Retrieving previously set annotations; checking what files are tagged"
        when_NOT_to_use: "When no annotations have been set"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_remove_annotation:
        purpose: "Remove an annotation by its id"
        cost: low
        reliability: high
        when_to_use: "Cleaning up stale or incorrect annotations"
        when_NOT_to_use: "When the annotation is still valid"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_bookmark:
        purpose: "Create or update a named bookmark pointing to file paths or directory prefixes"
        cost: low
        reliability: high
        when_to_use: "Saving a set of related files for reuse with ariadne_subgraph and ariadne_context"
        when_NOT_to_use: "For one-off file lookups"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_bookmarks:
        purpose: "List all saved bookmarks with their paths and descriptions"
        cost: low
        reliability: high
        when_to_use: "Checking what bookmarks exist before creating or using one"
        when_NOT_to_use: "When no bookmarks have been created"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_remove_bookmark:
        purpose: "Remove a bookmark by name"
        cost: low
        reliability: high
        when_to_use: "Cleaning up stale bookmarks"
        when_NOT_to_use: "When the bookmark is still useful"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_freshness:
        purpose: "Graph freshness: overall confidence, stale files list, last update time"
        cost: low
        reliability: high
        when_to_use: "Before relying on graph data, to verify it is current"
        when_NOT_to_use: "When you just updated the graph"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_hidden_deps:
        purpose: "Hidden dependencies: file pairs that co-change frequently but have no structural import link"
        cost: medium
        reliability: high
        when_to_use: "Finding implicit coupling and missing abstractions"
        when_NOT_to_use: "On projects with very short git history"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_ownership:
        purpose: "File ownership from git history: last author, top contributors, author count"
        cost: low
        reliability: high
        when_to_use: "Determining who owns or has expertise on specific files"
        when_NOT_to_use: "On solo projects where ownership is obvious"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_plan_impact:
        purpose: "Analyze structural impact of planned file changes: blast radius, affected tests, risk assessment"
        cost: medium
        reliability: high
        when_to_use: "Before implementing changes — to assess risk and identify affected tests"
        when_NOT_to_use: "After changes are already made (use ariadne_diff instead)"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_refactor_opportunities:
        purpose: "Detect refactoring opportunities: cycles, god files, coupling issues, merge/split candidates"
        cost: medium
        reliability: high
        when_to_use: "Architecture improvement planning; identifying highest-impact refactors"
        when_NOT_to_use: "When focused on feature work rather than structural improvement"
        budget_impact: "~3k tokens per call"
        token_estimate: 3000
      ariadne_suggest_placement:
        purpose: "Suggest optimal file location for a new module based on dependency relationships"
        cost: low
        reliability: high
        when_to_use: "When creating a new file and unsure where it should live in the project structure"
        when_NOT_to_use: "When the file location is already determined by convention"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_suggest_split:
        purpose: "Analyze a file and suggest how to split it into smaller, more cohesive modules"
        cost: medium
        reliability: high
        when_to_use: "When a file has grown too large and needs decomposition"
        when_NOT_to_use: "On files that are already small and cohesive"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_symbol_blast_radius:
        purpose: "Trace symbol blast radius: BFS through usages to find all affected symbols and files"
        cost: medium
        reliability: high
        when_to_use: "Before renaming or modifying a specific symbol — to see full impact"
        when_NOT_to_use: "When file-level blast radius is sufficient"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_symbol_search:
        purpose: "Search symbols by name across the entire project (case-insensitive substring match)"
        cost: low
        reliability: high
        when_to_use: "Finding where a function, class, or variable is defined across the codebase"
        when_NOT_to_use: "When you know the exact file and just need to read it"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_symbols:
        purpose: "Symbol definitions in a file: functions, classes, methods, interfaces, constants with visibility and line spans"
        cost: medium
        reliability: high
        when_to_use: "Getting an overview of what a file exports/defines without reading its full contents"
        when_NOT_to_use: "When you need the actual implementation code"
        budget_impact: "~2k tokens per call"
        token_estimate: 2000
      ariadne_tests_for:
        purpose: "Find test files covering given source files, with confidence levels and detection reasons"
        cost: low
        reliability: high
        when_to_use: "Before modifying a file — to identify which tests to run"
        when_NOT_to_use: "When you already know the test file locations"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      ariadne_views_export:
        purpose: "Pre-generated markdown views from .ariadne/views/ at L0 (project), L1 (cluster), L2 (file) levels"
        cost: medium-high
        reliability: high
        when_to_use: "Getting pre-rendered architecture documentation for a level of detail"
        when_NOT_to_use: "When you need dynamic/filtered data rather than static views"
        budget_impact: "~5k tokens per call"
        token_estimate: 5000
  claude_ai_Context7:
    type: documentation
    tools:
      resolve-library-id:
        purpose: "Resolve a library/package name to a Context7-compatible library ID for use with query-docs"
        cost: low
        reliability: medium
        when_to_use: "Before calling query-docs — to get the correct library ID for documentation lookup"
        when_NOT_to_use: "When you already have the Context7 library ID in /org/project format"
        budget_impact: "~1k tokens per call"
        token_estimate: 1000
      query-docs:
        purpose: "Fetch current documentation and code examples for any programming library or framework"
        cost: medium-high
        reliability: medium
        when_to_use: "When needing up-to-date API docs, configuration syntax, or usage examples for a library"
        when_NOT_to_use: "For general programming concepts, refactoring, debugging business logic, or code review"
        budget_impact: "~5-15k tokens per call"
        token_estimate: 10000
  claude_ai_Figma:
    type: design
    tools:
      get_design_context:
        purpose: "Get design context for a Figma node — primary tool for design-to-code workflows. Returns reference code, screenshot, and contextual metadata"
        cost: high
        reliability: medium
        when_to_use: "Converting Figma designs to code; understanding a design's structure and properties"
        when_NOT_to_use: "When no Figma file is involved; when you only need metadata overview"
        budget_impact: "~15-30k tokens per call (includes screenshot)"
        token_estimate: 20000
      get_screenshot:
        purpose: "Generate a screenshot for a given Figma node"
        cost: high
        reliability: medium
        when_to_use: "When you need a visual reference of a Figma design without code generation"
        when_NOT_to_use: "When get_design_context would serve better (it includes screenshots)"
        budget_impact: "~10-20k tokens per call (image data)"
        token_estimate: 15000
      get_metadata:
